services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quantmind
      POSTGRES_PASSWORD: quantmind
      POSTGRES_DB: quantmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - LLM_FAST=${LLM_FAST:-deepseek-v4-flash}
      - LLM_STRONG=${LLM_STRONG:-deepseek-v4-pro}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://apac.api.smith.langchain.com}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-true}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-quantmind}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_URL=postgresql://quantmind:quantmind@postgres:5432/quantmind
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    volumes:
      - quantmind_data:/app/data

volumes:
  qdrant_data:
  postgres_data:
  quantmind_data:
